services:
  postgres:
    image: postgres:16-alpine
    container_name: voting-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voting_dev}
      POSTGRES_DB: voting
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
